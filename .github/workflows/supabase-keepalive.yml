# Evita o pause por inatividade do Supabase free tier (~1 semana sem uso):
# uma consulta REST mínima 2x por semana conta como atividade do projeto.
# Em 2026-07-06 o projeto pausou e derrubou login/sync/reset de senha em produção.
name: Supabase keep-alive

on:
  schedule:
    # Segunda e quinta, 12:00 UTC
    - cron: '0 12 * * 1,4'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping REST API
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 \
            "$SUPABASE_URL/rest/v1/online_sessions?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")
          echo "Supabase respondeu HTTP $code"
          # 200 = RLS devolve lista vazia para anon (esperado).
          # Qualquer outra coisa indica projeto pausado ou config quebrada —
          # falha o job para o e-mail de aviso do GitHub chegar.
          [ "$code" = "200" ]
